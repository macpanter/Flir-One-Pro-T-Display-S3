name: Build FLIR Bridge Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Upload firmware.bin
        uses: actions/upload-artifact@v4
        with:
          name: flir-bridge-firmware
          path: |
            .pio/build/flir_tdisplay_s3/firmware.bin
            .pio/build/flir_tdisplay_s3/bootloader.bin
            .pio/build/flir_tdisplay_s3/partitions.bin
          retention-days: 30
